plugins {
    id "com.android.application"
}

def configuredUrl = project.findProperty("worldConsoleUrl") ?: ""

android {
    namespace "com.codex.worldconsole"
    compileSdk 35

    buildFeatures {
        buildConfig true
    }

    defaultConfig {
        applicationId "com.codex.worldconsole"
        minSdk 23
        targetSdk 35
        versionCode 4
        versionName "0.1.4"
        buildConfigField "String", "WORLD_CONSOLE_URL", "\"${configuredUrl}\""
    }
}
